build:
    nodes:
        analysis:
            environment:
                php:
                    version: 8.4
            cache:
                disabled: false
                directories:
                    - ~/.composer/cache
            project_setup:
                override: true
            tests:
                override:
                    - php-scrutinizer-run
                    - phpcs-run

    dependencies:
        override:
            - composer install --no-interaction --prefer-dist

checks:
    php:
        code_rating: true
        duplication: true
        coupling: true

tools:
    external_code_coverage:
        runs: 2
        timeout: 600

build_failure_conditions:
    - 'elements.rating(<= C).new.exists'
    - 'issues.severity(>= MAJOR).new.exists'
    - 'project.metric_change("scrutinizer.test_coverage", < -0.5)'
    - 'patches.label("Unused Use Statements").new.exists'
